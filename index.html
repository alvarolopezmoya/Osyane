<style>
  html, body { background: #fbfaf6; color: #0f1320; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }
  .hatch-stripes {
    background-image: repeating-linear-gradient(135deg, rgba(15,19,32,0.05) 0 1px, transparent 1px 10px);
  }
  .hatch-gold {
    background-image: repeating-linear-gradient(135deg, rgba(255,184,0,0.18) 0 1px, transparent 1px 8px);
  }
  .hatch-blue {
    background-image: repeating-linear-gradient(135deg, rgba(0,48,135,0.14) 0 1px, transparent 1px 8px);
  }
  /* subtle animated bar */
  @keyframes xpShine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }
  .xp-shine::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
    animation: xpShine 2.8s ease-in-out infinite;
    mix-blend-mode: overlay;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .rise-in { animation: riseIn .45s ease-out both; }
  @keyframes countTick {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1px); }
  }
  .pulse-dot { animation: countTick 1.6s ease-in-out infinite; }
  /* ── Mobile responsive overrides ── */
  @media (max-width: 768px) {
    .mobile-hide { display: none !important; }
    .mobile-full { width: 100% !important; }
    .mobile-stack { flex-direction: column !important; }
    .mobile-grid-1 { grid-template-columns: 1fr !important; }
    .mobile-grid-2 { grid-template-columns: 1fr 1fr !important; }
    .mobile-p { padding: 16px !important; }
    .mobile-small-text { font-size: 11px !important; }
  }
  /* scrollbar polish */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: #dde1ef; border-radius: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  /* custom radio/toggle */
  .toggle-pill { transition: all .18s ease; }
  /* thin dashed separator */
  .sep { border-top: 1px dashed #e6e8f1; }

  /* === Fallback utilities for classes Tailwind v4 browser may miss in dynamic JSX === */
  .col-span-1 { grid-column: span 1 / span 1; }
  .col-span-2 { grid-column: span 2 / span 2; }
  .col-span-3 { grid-column: span 3 / span 3; }
  .col-span-4 { grid-column: span 4 / span 4; }
  .col-span-5 { grid-column: span 5 / span 5; }
  .col-span-6 { grid-column: span 6 / span 6; }
  .col-span-7 { grid-column: span 7 / span 7; }
  .col-span-8 { grid-column: span 8 / span 8; }
  .col-span-9 { grid-column: span 9 / span 9; }
  .col-span-12 { grid-column: span 12 / span 12; }
  @media (min-width: 1024px) {
    .lg\:col-span-3  { grid-column: span 3 / span 3; }
    .lg\:col-span-4  { grid-column: span 4 / span 4; }
    .lg\:col-span-5  { grid-column: span 5 / span 5; }
    .lg\:col-span-8  { grid-column: span 8 / span 8; }
  }
</style>
