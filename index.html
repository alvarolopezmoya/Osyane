<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #060912;
  --bg-sidebar: #040710;
  --bg-card:    #0b1121;
  --bg-card2:   #080e1e;
  --bg-input:   #070c1a;
  --bg-raised:  #111c35;
  --bg-overlay: rgba(4,7,16,0.92);

  --bd:    rgba(255,255,255,0.07);
  --bd-md: rgba(255,255,255,0.11);
  --bd-hi: rgba(255,255,255,0.18);

  --t1: #e8edf8;
  --t2: #5a6a8a;
  --t3: #2c3a58;
  --t4: #18243a;

  --blue:        #4f8ef7;
  --blue-bright: #7db3ff;
  --blue-dim:    rgba(79,142,247,0.12);
  --blue-glow:   rgba(79,142,247,0.38);
  --blue-mid:    rgba(79,142,247,0.22);

  --gold:        #f5a623;
  --gold-bright: #ffcc5c;
  --gold-dim:    rgba(245,166,35,0.13);
  --gold-glow:   rgba(245,166,35,0.42);

  --green:  #0fd9a0;
  --red:    #f43f5e;
  --purple: #a78bfa;
  --teal:   #22d3ee;

  --shadow-card: 0 4px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
  --shadow-lift: 0 12px 40px rgba(0,0,0,0.55), 0 0 0 1px var(--bd-md);
  --shadow-pop:  0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px var(--bd-md);
  --shadow-blue: 0 0 28px var(--blue-glow);
  --shadow-gold: 0 0 28px var(--gold-glow);

  --r-sm: 8px;  --r-md: 12px;  --r-lg: 16px;  --r-xl: 20px;
}

html, body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  height: 100%;
}

/* Ambient mesh background */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15%  8%, rgba(79,142,247,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 55% 65% at 85% 85%, rgba(167,139,250,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 45% 45% at 55% 45%, rgba(79,142,247,0.04) 0%, transparent 65%);
}
#root { position: relative; z-index: 1; height: 100%; }

.head { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
.num  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }

/* ── Glass ── */
.glass {
  background: rgba(11,17,33,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--bd);
}

/* ── Card ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--bd);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
}
.card-hover {
  transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s ease, border-color .2s ease;
}
.card-hover:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lift);
  border-color: var(--bd-md);
}

/* ── Gradient border ── */
.grad-border { position: relative; }
.grad-border::before {
  content: '';
  position: absolute; inset: -1px; border-radius: inherit;
  background: linear-gradient(135deg, rgba(79,142,247,0.35) 0%, transparent 50%, rgba(167,139,250,0.2) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  padding: 1px; pointer-events: none;
}

/* ── Gradient text ── */
.grad-text-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.grad-text-blue {
  background: linear-gradient(135deg, var(--blue-bright) 0%, var(--purple) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Nav ── */
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--r-sm);
  border: none; cursor: pointer; width: 100%;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--t2); background: transparent;
  transition: background .15s, color .15s;
  position: relative; margin-bottom: 2px; text-align: left;
}
.nav-link:hover { background: rgba(255,255,255,0.04); color: #94a3b8; }
.nav-link.active { background: var(--blue-dim); color: var(--t1); font-weight: 600; }
.nav-link.active::before {
  content: '';
  position: absolute; left: 0; top: 7px; bottom: 7px;
  width: 3px; border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--blue), var(--blue-bright));
  box-shadow: 0 0 12px var(--blue-glow);
}
.nav-link.solo { justify-content: center; padding: 10px; }

/* ── XP bar ── */
@keyframes xpShine {
  0%   { transform: translateX(-130%) skewX(-20deg); }
  100% { transform: translateX(380%)  skewX(-20deg); }
}
.xp-track { background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
.xp-fill {
  height: 100%; border-radius: 99px; position: relative;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
  box-shadow: 0 0 18px var(--gold-glow), 0 0 6px var(--gold);
  transition: width .9s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.xp-fill::after {
  content: '';
  position: absolute; inset: 0; width: 35%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  animation: xpShine 3.5s ease-in-out infinite;
}

/* ── Animations ── */
@keyframes riseIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes floatUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
@keyframes spin-slow { to { transform: rotate(360deg); } }
@keyframes orb-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(24px,-18px) scale(1.06); }
  66%     { transform: translate(-16px,12px) scale(0.97); }
}
@keyframes pillar-grow {
  from { height: 0 !important; }
}

.rise-in  { animation: riseIn  .5s cubic-bezier(.16,1,.3,1) both; }
.fade-in  { animation: fadeIn  .25s ease both; }
.float-up { animation: floatUp .55s cubic-bezier(.16,1,.3,1) both; }
.pulse-dot { animation: pulse 2.5s ease-in-out infinite; }

.d1 { animation-delay: .06s; }
.d2 { animation-delay: .12s; }
.d3 { animation-delay: .18s; }
.d4 { animation-delay: .24s; }
.d5 { animation-delay: .30s; }
.d6 { animation-delay: .36s; }

/* ── Filter pill ── */
.pill-btn {
  padding: 5px 14px; border-radius: 99px;
  font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif; border: 1px solid var(--bd-md);
  background: transparent; color: var(--t2); cursor: pointer; transition: all .15s;
}
.pill-btn:hover { border-color: var(--bd-hi); color: #94a3b8; }
.pill-btn.active {
  background: var(--blue-dim); border-color: var(--blue);
  color: var(--blue-bright); box-shadow: 0 0 12px var(--blue-dim);
}

/* ── Tab ── */
.tab {
  padding: 12px 18px; border: none; background: none; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--t2); border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s; white-space: nowrap;
}
.tab:hover { color: #94a3b8; }
.tab.active { color: var(--blue-bright); font-weight: 600; border-bottom-color: var(--blue); }

/* ── XP picks ── */
.xp-pick {
  padding: 5px 13px; border-radius: 7px; border: 1px solid var(--bd-md);
  background: transparent; color: var(--t2);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
  font-family: 'JetBrains Mono', monospace;
}
.xp-pick:hover  { border-color: var(--blue); color: var(--blue-bright); background: var(--blue-dim); }
.xp-pick.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: var(--shadow-blue); }

/* ── Glow card ── */
.glow-card {
  position: relative; background: var(--bg-card);
  border: 1px solid var(--bd); border-radius: var(--r-lg);
}
.glow-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, rgba(79,142,247,0.25), transparent 60%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}

/* ── Table row hover ── */
.tr:hover { background: rgba(255,255,255,0.025) !important; }

/* ── Scrollbar ── */
*::-webkit-scrollbar { width: 4px; height: 4px; }
*::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
*::-webkit-scrollbar-track { background: transparent; }

/* ── Focus ── */
button:focus-visible, input:focus-visible {
  outline: 2px solid var(--blue); outline-offset: 2px;
}

/* ── Grid helpers ── */
.col-span-1{grid-column:span 1/span 1}
.col-span-2{grid-column:span 2/span 2}
.col-span-3{grid-column:span 3/span 3}
.col-span-4{grid-column:span 4/span 4}
.col-span-5{grid-column:span 5/span 5}
.col-span-6{grid-column:span 6/span 6}
.col-span-7{grid-column:span 7/span 7}
.col-span-8{grid-column:span 8/span 8}
.col-span-9{grid-column:span 9/span 9}
.col-span-12{grid-column:span 12/span 12}
.row-span-2{grid-row:span 2/span 2}

/* ── Stat card hover (CSS — no React state) ── */
.stat-card {
  transition: transform .18s cubic-bezier(.4,0,.2,1), box-shadow .18s ease, border-color .18s ease;
  will-change: transform;
}
.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.52) !important;
  border-color: rgba(255,255,255,0.12) !important;
}

/* ── Badge card hover (CSS) ── */
.badge-card {
  transition: transform .18s cubic-bezier(.4,0,.2,1), box-shadow .18s ease, border-color .18s ease, opacity .18s;
  will-change: transform;
}
.badge-card:hover { transform: translateY(-3px); }
.badge-card.earned:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 20px rgba(245,166,35,0.18) !important;
  border-color: rgba(245,166,35,0.6) !important;
}

/* ── Shake ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(-9px); }
  40%     { transform: translateX(9px); }
  65%     { transform: translateX(-5px); }
  82%     { transform: translateX(5px); }
}
.shake { animation: shake .52s cubic-bezier(.36,.07,.19,.97) both; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .m-hide { display: none !important; }
  .m-full { width: 100% !important; }
}
</style>

</body>
